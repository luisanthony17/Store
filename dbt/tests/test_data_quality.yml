# dbt/tests/test_data_quality.yml
#
# Tests que corren automáticamente con: dbt test
# Estos tests se ejecutarán en GitHub Actions en cada push.

version: 2

models:
  - name: stg_orders
    description: "Tabla Silver de pedidos limpia y tipada"
    columns:
      - name: order_id
        description: "ID único del pedido"
        tests:
          - not_null
      - name: product_id
        description: "ID del producto"
        tests:
          - not_null
      - name: sales
        description: "Monto de venta"
        tests:
          - not_null
      - name: profit
        description: "Ganancia del pedido"
        tests:
          - not_null
      - name: discount
        description: "Descuento aplicado (0 a 1)"
        tests:
          - not_null
      - name: category
        description: "Categoría del producto"
        tests:
          - not_null
          - accepted_values:
              values: ['Furniture', 'Office Supplies', 'Technology']
      - name: market
        description: "Mercado geográfico"
        tests:
          - not_null
          - accepted_values:
              values: ['US', 'EU', 'APAC', 'LATAM', 'EMEA', 'Africa', 'Canada']

  - name: fct_profitability
    description: "Métricas de profitabilidad por mercado, categoría y año"
    columns:
      - name: market
        tests:
          - not_null
      - name: category
        tests:
          - not_null
      - name: total_sales
        tests:
          - not_null
      - name: total_profit
        tests:
          - not_null
      - name: profit_health
        tests:
          - not_null
          - accepted_values:
              values: ['perdida', 'margen_critico', 'margen_bajo', 'saludable']

  - name: fct_discount_impact
    description: "Impacto del descuento en la rentabilidad por categoría"
    columns:
      - name: discount_bucket
        tests:
          - not_null
      - name: category
        tests:
          - not_null
